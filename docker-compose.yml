services:
  garmin:
    build:
      context: ./garmin-service
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    env_file:
      - .env
    volumes:
      - ./data/garmin-tokens:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3011/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3010:3010"
    environment:
      - API_URL=${API_URL}
      - FRONT_END_URL=${FRONT_END_URL}
      - DB_FILE_NAME=${DB_FILE_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WITHINGS_CLIENT_ID=${WITHINGS_CLIENT_ID}
      - WITHINGS_CLIENT_SECRET=${WITHINGS_CLIENT_SECRET}
      - GARMIN_API_URL=${GARMIN_API_URL}
      - GARMIN_ADMIN_KEY=${GARMIN_ADMIN_KEY}
    volumes:
      - ./api/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3010}
    labels:
      - "traefik.http.routers.tessera-api-via-web-https.rule=Host(`api.tessera.herbievine.com`)"
      - "traefik.http.routers.tessera-api-via-web-https.entryPoints=https"
      - "traefik.http.routers.tessera-api-via-web-https.tls=true"
      - "traefik.http.routers.tessera-api-via-web-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tessera-api-via-web-https.priority=200"
      - "traefik.http.routers.tessera-api-via-web-http.rule=Host(`api.tessera.herbievine.com`)"
      - "traefik.http.routers.tessera-api-via-web-http.entryPoints=http"
      - "traefik.http.routers.tessera-api-via-web-http.middlewares=redirect-to-https"
      - "traefik.http.routers.tessera-api-via-web-http.priority=200"
    restart: unless-stopped
    depends_on:
      - api


