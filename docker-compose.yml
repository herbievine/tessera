services:
  garmin:
    build:
      context: ./garmin-service
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    env_file:
      - .env
    volumes:
      - ./data/garmin-tokens:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3011/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3010:3010"
    environment:
      - API_URL=${API_URL}
      - FRONT_END_URL=${FRONT_END_URL}
      - DB_FILE_NAME=${DB_FILE_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WITHINGS_CLIENT_ID=${WITHINGS_CLIENT_ID}
      - WITHINGS_CLIENT_SECRET=${WITHINGS_CLIENT_SECRET}
      - GARMIN_API_URL=${GARMIN_API_URL}
      - GARMIN_ADMIN_KEY=${GARMIN_ADMIN_KEY}
    labels:
      - "traefik.http.routers.https-0-c0wcwk0g840scggo0o4ckgow-api.service=tessera-api-svc"
      - "traefik.http.routers.http-0-c0wcwk0g840scggo0o4ckgow-api.service=tessera-api-svc"
      - "traefik.http.services.tessera-api-svc.loadbalancer.server.port=3010"
    volumes:
      - ./api/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3010}
    restart: unless-stopped
    depends_on:
      - api


